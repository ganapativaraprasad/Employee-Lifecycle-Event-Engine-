name: CI Pipeline

on:
  push:
    branches:
      - main

  pull_request:
    branches:
      - main

jobs:

  lint:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout Code
        uses: actions/checkout@v4

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Install Dependencies
        run: |
          pip install -r requirements.txt

      - name: Run Flake8
        run: |
          flake8 app --ignore=E501,E302,E303,E305,E225,E122,E712,W291,W292,W293,E722,F401,F811,E402,E741

  type-check:
    runs-on: ubuntu-latest

    needs: lint

    steps:
      - name: Checkout Code
        uses: actions/checkout@v4

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Install Dependencies
        run: |
          pip install -r requirements.txt

      - name: Run MyPy
        run: |
          mypy --strict app

  test:
    runs-on: ubuntu-latest

    needs: type-check

    steps:
      - name: Checkout Code
        uses: actions/checkout@v4

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Install Dependencies
        run: |
          pip install -r requirements.txt

      - name: Run Tests
        run: |
          pytest tests --cov=app --cov-report=term

  contract-tests:
    runs-on: ubuntu-latest

    needs: test

    steps:
      - name: Checkout Code
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: "20"

      - name: Install Frontend Dependencies
        working-directory: frontend
        run: |
          npm install

      - name: Run Pact Consumer Contract Tests
        working-directory: frontend
        run: |
          npx vitest run tests/contracts

      - name: Verify Pact Files Generated
        run: |
          ls -la frontend/pacts

  build:
    runs-on: ubuntu-latest

    needs: contract-tests

    steps:
      - name: Checkout Code
        uses: actions/checkout@v4

      - name: Build Docker Image
        run: |
          docker build -t employee-lifecycle-engine .